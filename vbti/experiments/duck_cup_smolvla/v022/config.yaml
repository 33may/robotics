    - hue
training:
  epochs: 12
  batch_size: 12
  lr: 0.0001
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  warmup_steps: 1500
  decay_lr: 2.5e-06
  lr_schedule: cosine
  decay_ratio: 0.6
  num_workers: 8
  device: auto
  seed: 42
  fp16: false
  bf16: true
  vision_lr_scale: 0.1
  gradient_checkpoint: false
logging:
  log_freq: 200
  save_freq: 7032
  val_freq: 500
  val_size: 50
  wandb_enabled: true
  wandb_project: vbti-training
  wandb_entity: null
  wandb_mode: online
eval:
  n_episodes: 50
  sim_env: null
  record_video: true
