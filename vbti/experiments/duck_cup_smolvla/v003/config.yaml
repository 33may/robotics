model:
  type: smolvla
  pretrained: lerobot/smolvla_base
  chunk_size: 50
  n_obs_steps: 1
  freeze_vision_encoder: true
  train_expert_only: true
  train_state_proj: true
  empty_cameras: 0
  tokenizer_max_length: 48
  num_denoising_steps: 10
dataset:
  sources:
  - repo_id: eternalmay33/so101_real_pick_place_50eps_trimmed
    root: ~/.cache/huggingface/lerobot/eternalmay33/so101_real_pick_place_50eps_trimmed
    episodes: null
    weight: 1.0
    source: real
    role: both
  cameras:
    names:
    - top
    - left
    - right
    - gripper
    remap: null
  train_ratio: 0.95
  val_sources: null
  use_imagenet_stats: true
training:
  steps: 10000
  batch_size: 8
  lr: 1.0e-05
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  warmup_steps: 500
  decay_lr: 2.5e-06
  num_workers: 2
  seed: 42
  fp16: false
  bf16: true
logging:
  log_freq: 100
  save_freq: 1000
  val_freq: 500
  val_size: 50
  wandb_enabled: false
  wandb_project: vbti-training
  wandb_entity: null
  wandb_mode: online
eval:
  n_episodes: 50
  sim_env: null
  record_video: true
