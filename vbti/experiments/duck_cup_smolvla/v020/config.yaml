model:
  type: smolvla
  pretrained: lerobot/smolvla_base
  chunk_size: 50
  n_obs_steps: 1
  freeze_vision_encoder: false
  train_expert_only: true
  train_state_proj: true
  empty_cameras: 0
  tokenizer_max_length: 48
  num_denoising_steps: 10
dataset:
  sources:
  - repo_id: eternalmay33/duck_cup_v020_all
    root: null
    episodes: null
    weight: 1.0
    source: real
    role: both
  cameras:
    names:
    - top
    - left
    - right
    - gripper
    - gripper_depth
    remap: null
  train_ratio: 1
  val_sources: null
  use_imagenet_stats: true
  image_transforms:
    enable: true
    max_num_transforms: 3
    disable_transforms:
    - saturation
    - hue
training:
  epochs: 12                        # source of truth — engine derives steps from epochs × frames / BS
  batch_size: 12                    # r12: BS=12 GC=OFF fits at ~22 GB → recovers 25% throughput
  lr: 0.0001
  weight_decay: 1.0e-10
  grad_clip_norm: 10.0
  warmup_steps: 1500
  decay_lr: 2.5e-06
  lr_schedule: cosine
  decay_ratio: 0.6
  num_workers: 8
  device: auto
  seed: 42
  fp16: false
  bf16: true
  vision_lr_scale: 0.1
  gradient_checkpoint: false        # r12: BS=12 GC=OFF fits comfortably; recover 25% throughput vs BS=16 GC=ON
logging:
  log_freq: 200
  save_freq: 10000
  val_freq: 500
  val_size: 50
  wandb_enabled: true
  wandb_project: vbti-training
  wandb_entity: null
  wandb_mode: online
eval:
  n_episodes: 50
  sim_env: null
  record_video: true
