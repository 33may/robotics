# warehouse-aisles-v1 — coverage-drive TARGETS for the map bake (MAY-173 locdev T2).
#
# Sparse targets only: the drive expands them with the DEPLOYMENT planner
# (routes.plan_route → build_planner), so the recorded trajectory has the same
# geometry Nav produces at eval time. Approved render: 22 targets → 321 m dense
# path, ~6.7 min @ 0.8 m/s, clearance 0.5 m, 0 violations (2026-07-15).
#
# Shape: serpentine up/down aisles 1–4 (racks y≈9–25, aisle centers 4.9 m apart),
# bottom stub into aisle 6 (debris blocks y≈9.8–11.8), open-floor perimeter +
# NW→SE diagonal (heading diversity in the wall-failure zone), re-climb aisle 4,
# top stubs over aisle 5 (debris y≈8.4–15) and aisle 6 (end mid-aisle).
name: warehouse-aisles-v1
clearance_m: 0.5
speed: 0.8
loop: false
waypoints:
  - [-22.80, 7.0]    # 0  aisle 1 bottom (start)
  - [-22.80, 28.7]   # 1  aisle 1 top
  - [-17.88, 28.7]   # 2  aisle 2 top
  - [-17.88, 7.0]    # 3  aisle 2 bottom
  - [-12.90, 7.0]    # 4  aisle 3 bottom
  - [-12.90, 28.7]   # 5  aisle 3 top
  - [-7.97, 28.7]    # 6  aisle 4 top
  - [-7.97, 7.0]     # 7  aisle 4 bottom
  - [1.96, 7.0]      # 8  aisle 6 bottom
  - [1.96, 9.0]      # 9  aisle 6 bottom stub (debris above)
  - [1.96, 2.0]      # 10 floor NE
  - [1.96, -20.5]    # 11 floor SE
  - [-22.80, -20.5]  # 12 floor SW
  - [-22.80, 2.0]    # 13 floor NW
  - [1.96, -20.5]    # 14 NW→SE diagonal (viewpoint diversity)
  - [-7.97, 7.0]     # 15 back to aisle 4 bottom (second diagonal)
  - [-7.97, 28.7]    # 16 re-climb aisle 4
  - [-3.02, 28.7]    # 17 aisle 5 top
  - [-3.02, 16.5]    # 18 aisle 5 top stub (debris below)
  - [-3.02, 28.7]    # 19 aisle 5 top again
  - [1.96, 28.7]     # 20 aisle 6 top
  - [1.96, 13.0]     # 21 aisle 6 top stub (end)
