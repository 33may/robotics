[pytest]
# rootdir = humanoid/. ".." puts the repo root on sys.path so the `humanoid`
# namespace package (humanoid.logic.oli, ...) imports in any env (brain/isaac),
# independent of whether a vbti.pth is installed in that env's site-packages.
pythonpath = ..
testpaths = tests
addopts = -q --import-mode=importlib
markers =
    isaac: tests that require the `isaac` env (isaacsim) — skipped in the brain env
    brain: pure-brain tests (no isaacsim/limxsdk) — the deployment-invariant core
